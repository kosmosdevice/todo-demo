<h1>Todo App</h1>

<input [(ngModel)]="newTodoTitle" placeholder="Add a todo..." />
<button (click)="addTodo()">Add</button>

<ul>
  @for (todo of todoService.todos(); track todo.id) {
    <li>
      <span [style.text-decoration]="todo.isCompleted ? 'line-through' : 'none'">
        {{ todo.title }}
      </span>
      <button (click)="todoService.completeTodo(todo.id)">✅</button>
      <button (click)="todoService.deleteTodo(todo.id)">🗑️</button>
    </li>
  }
</ul>
