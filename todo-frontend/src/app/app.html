<h1>Todo App</h1>

<input [(ngModel)]="newTodoTitle"
        (keyup.enter)="addTodo()"
        (input)="errorMessage = ''"
        placeholder="Add a todo..." />

@if (errorMessage) {
  <div style="color: red;">{{ errorMessage }}</div>
}
<button (click)="addTodo()">Add</button>

<ul>
  @for (todo of todoService.todos(); track todo.id) {
    <li>
      <span [style.text-decoration]="todo.isCompleted ? 'line-through' : 'none'">
        {{ todo.title }}
      </span>
      <button (click)="todoService.updateTodo(todo)">✅</button>
      <button (click)="todoService.deleteTodo(todo.id)">🗑️</button>
    </li>
  }
</ul>
